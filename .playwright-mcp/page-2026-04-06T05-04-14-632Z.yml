    - generic [ref=e188]:
      - generic [ref=e189]:
        - heading "SNAP CATEGORICAL ELIGIBILITY/INELIGIBILITY" [level=1] [ref=e190]
        - paragraph [ref=e191]: "ISSUE DATE: 03/2026"
      - paragraph [ref=e192]:
        - text: "MFIP, MSA, HSP:"
        - text: No provisions.
        - text: "SNAP:"
        - text: There are two categories of Categorical Eligibility.
        - text: "1. Categorically Eligible (CE):"
        - text: SNAP Categorical Eligibility means a unit has already met the gross income test, net income test, residency test, and/or asset test of another means-tested program and are now exempt from these tests for SNAP eligibility.
      - paragraph
      - paragraph [ref=e193]: "Units composed entirely of people who receive GA, MSA, or SSI meet the criteria of CE, including units that:"
      - paragraph
      - table "table" [ref=e194]:
        - rowgroup [ref=e195]:
          - row "● Have been approved for GA, MSA, SSI but have not yet received payment." [ref=e196]:
            - cell "●" [ref=e197]:
              - paragraph [ref=e198]: ●
            - cell "Have been approved for GA, MSA, SSI but have not yet received payment." [ref=e199]:
              - paragraph [ref=e200]: Have been approved for GA, MSA, SSI but have not yet received payment.
          - row "● Their GA, MSA, or SSI payments have been suspended or are being recouped. People suspended for non-compliance with treatment referral requirements for a drug addiction and/or alcoholic condition are not categorically eligible during the period of suspension." [ref=e201]:
            - cell "●" [ref=e202]:
              - paragraph [ref=e203]: ●
            - cell "Their GA, MSA, or SSI payments have been suspended or are being recouped. People suspended for non-compliance with treatment referral requirements for a drug addiction and/or alcoholic condition are not categorically eligible during the period of suspension." [ref=e204]:
              - paragraph [ref=e205]: Their GA, MSA, or SSI payments have been suspended or are being recouped. People suspended for non-compliance with treatment referral requirements for a drug addiction and/or alcoholic condition are not categorically eligible during the period of suspension.
      - paragraph
      - paragraph [ref=e206]: "Additionally, units with at least 1 unit member who is receiving or is eligible to receive benefits and services upon request from 1 of the following programs meets the criteria of CE:"
      - paragraph
      - table "table" [ref=e207]:
        - rowgroup [ref=e208]:
          - row "● Transition Year Child Care. See 0029.30 (Child Care Assistance)." [ref=e209]:
            - cell "●" [ref=e210]:
              - paragraph [ref=e211]: ●
            - cell "Transition Year Child Care. See 0029.30 (Child Care Assistance)." [ref=e212]:
              - paragraph [ref=e213]:
                - text: Transition Year Child Care. See
                - link "0029.30 (Child Care Assistance)" [ref=e214] [cursor=pointer]:
                  - /url: https://www.dhs.state.mn.us/main/idcplg?IdcService=GET_DYNAMIC_CONVERSION&RevisionSelectionMethod=LatestReleased&dDocName=cm_002930
                - text: .
          - row "● Basic Sliding Fee Child Care. Being on the Basic Sliding Fee waiting list does not meet the Categorical Eligibility criteria. See 0029.30 (Child Care Assistance)." [ref=e215]:
            - cell "●" [ref=e216]:
              - paragraph [ref=e217]: ●
            - cell "Basic Sliding Fee Child Care. Being on the Basic Sliding Fee waiting list does not meet the Categorical Eligibility criteria. See 0029.30 (Child Care Assistance)." [ref=e218]:
              - paragraph [ref=e219]:
                - text: Basic Sliding Fee Child Care. Being on the Basic Sliding Fee waiting list does not meet the Categorical Eligibility criteria. See
                - link "0029.30 (Child Care Assistance)" [ref=e220] [cursor=pointer]:
                  - /url: https://www.dhs.state.mn.us/main/idcplg?IdcService=GET_DYNAMIC_CONVERSION&RevisionSelectionMethod=LatestReleased&dDocName=cm_002930
                - text: .
          - row [ref=e221]:
            - cell [ref=e222]
            - cell [ref=e223]
      - paragraph
      - paragraph [ref=e224]:
        - text: "2. Broad-Based Categorically Eligible (BBCE):"
        - text: Units that meet BBCE are exempt from asset limit and net income tests.
      - paragraph
      - paragraph [ref=e225]: "When a unit does not meet the CE criteria above, the unit may be BBCE if they meet the following criteria:"
      - paragraph
      - paragraph
      - table "table" [ref=e226]:
        - rowgroup [ref=e227]:
          - row "● The unit’s countable gross income is at or below 200% FPG income limits. See 0019.06 (Gross Income Limits)." [ref=e228]:
            - cell "●" [ref=e229]:
              - paragraph [ref=e230]: ●
            - cell "The unit’s countable gross income is at or below 200% FPG income limits. See 0019.06 (Gross Income Limits)." [ref=e231]:
              - paragraph [ref=e232]:
                - text: The unit’s countable gross income is at or below 200% FPG income limits. See
                - link "0019.06 (Gross Income Limits)" [ref=e233] [cursor=pointer]:
                  - /url: https://www.dhs.state.mn.us/main/idcplg?IdcService=GET_DYNAMIC_CONVERSION&RevisionSelectionMethod=LatestReleased&dDocName=cm_001906
                - generic [ref=e234]: .
          - row "● The unit has been given, or will be given upon approval, the Domestic Violence Information Brochure (DHS-3477). See 0029.36 (Domestic Violence Brochure)." [ref=e235]:
            - cell "●" [ref=e236]:
              - paragraph [ref=e237]: ●
            - cell "The unit has been given, or will be given upon approval, the Domestic Violence Information Brochure (DHS-3477). See 0029.36 (Domestic Violence Brochure)." [ref=e238]:
              - paragraph [ref=e239]:
                - text: The unit has been given, or will be given upon approval, the Domestic Violence Information Brochure (DHS-3477). See
                - link "0029.36 (Domestic Violence Brochure)" [ref=e240] [cursor=pointer]:
                  - /url: https://www.dhs.state.mn.us/main/idcplg?IdcService=GET_DYNAMIC_CONVERSION&RevisionSelectionMethod=LatestReleased&dDocName=cm_002936
                - text: .
      - paragraph [ref=e241]: Units that do not meet the criteria for CE and exceed the 200% FPG income limits for BBCE, are not eligible for SNAP. However, units with an eligible elderly or disabled member with income above 200% FPG may still be eligible to receive SNAP benefits. See “Units with an Eligible Elderly or Disabled Unit Member” below for more information.
      - paragraph
      - paragraph [ref=e242]:
        - text: Benefit Level for CE and BBCE Units
        - generic [ref=e243]: CE and BBCE units are not subject to a net income test. Therefore, dependi
        - text: ng on their income and deductions, units of 1 or 2 people may be eligible for at least the minimum SNAP benefit allotment and units with 3 or more people may be eligible for $0 in SNAP benefits. This does not apply when benefits are prorated or recouped. See
        - link "0022.12.01 (How to Calculate Benefit Level – SNAP/MSA/HSP)" [ref=e244] [cursor=pointer]:
          - /url: https://www.dhs.state.mn.us/main/idcplg?IdcService=GET_DYNAMIC_CONVERSION&RevisionSelectionMethod=LatestReleased&dDocName=cm_00221201
        - text: .
      - paragraph
      - paragraph [ref=e245]: "NOTE: Being eligible for SNAP at any benefit level (including $0 SNAP benefit cases) allows units to be eligible for other programs including, but not limited to: Energy Assistance, telephone discount programs, subsidized housing, SNAP-Ed, Women, Infants, and Children (WIC) Program, etc."
      - paragraph
      - paragraph [ref=e246]:
        - text: Units with an Eligible Elderly or Disabled Unit Member
        - text: To determine if a unit member meets the disability criteria for this purpose, see category 1 in
        - link "0010.18.06 (Verifying Disability/Incapacity – SNAP)" [ref=e247] [cursor=pointer]:
          - /url: https://www.dhs.state.mn.us/main/idcplg?IdcService=GET_DYNAMIC_CONVERSION&RevisionSelectionMethod=LatestReleased&dDocName=cm_00101806
        - text: . For elderly, see
        - 'link "0002.19 (Glossary: Early…)" [ref=e248] [cursor=pointer]':
          - /url: https://www.dhs.state.mn.us/main/idcplg?IdcService=GET_DYNAMIC_CONVERSION&RevisionSelectionMethod=LatestReleased&dDocName=cm_000219
        - text: .
      - paragraph
      - paragraph [ref=e249]: Units with an eligible elderly or disabled member are not subject to a gross income test.
      - paragraph
      - paragraph [ref=e250]: When a unit with an eligible elderly or disabled unit member does not meet the CE criteria but the unit’s gross income is under 200% FPG for the unit size, the unit may be eligible for BBCE.
      - paragraph
      - paragraph [ref=e251]: "When a unit with an eligible elderly or disabled member has gross income over 200% FPG for the unit size, the unit is not eligible for CE or BBCE and is considered non-categorically eligible. These units must meet the following to be SNAP eligible:"
      - paragraph
      - paragraph
      - table "table" [ref=e252]:
        - rowgroup [ref=e253]:
          - row "● Asset limit. See 0015.81 (Assets – SNAP)." [ref=e254]:
