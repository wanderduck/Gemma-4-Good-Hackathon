        - heading "GA ASSISTANCE STANDARDS" [level=1] [ref=e130]
        - paragraph [ref=e131]: "ISSUE DATE: 04/2026"
      - paragraph [ref=e132]:
        - text: "MFIP, SNAP, MSA, HSP:"
        - text: No provisions.
        - text: "GA:"
        - text: People who live in a licensed residential facility (including all residents of the Minnesota Sex Offender Program), receive Housing Support, or receive substance use disorder treatment services are eligible for the GA personal needs allowance. See
        - link "0020.24 (Personal Needs Allowance)" [ref=e133] [cursor=pointer]:
          - /url: https://www.dhs.state.mn.us/main/idcplg?IdcService=GET_DYNAMIC_CONVERSION&RevisionSelectionMethod=LatestReleased&dDocName=cm_002024
        - text: ","
        - link "0013.15.12 (GA – Basis – Placement in a Facility)" [ref=e134] [cursor=pointer]:
          - /url: https://www.dhs.state.mn.us/main/idcplg?IdcService=GET_DYNAMIC_CONVERSION&RevisionSelectionMethod=LatestReleased&dDocName=cm_00131512
        - text: ", and"
        - link "0013.15.54 (GA Basis – Drug/Alcohol Addiction)." [ref=e135] [cursor=pointer]:
          - /url: https://www.dhs.state.mn.us/main/idcplg?IdcService=GET_DYNAMIC_CONVERSION&RevisionSelectionMethod=LatestReleased&dDocName=cm_00131554
        - text: Pay the personal needs allowance to the client or their authorized representative.
        - text: Residents of homeless or family violence shelters, and people with drug or alcohol addiction who live in the community and are not receiving substance use disorder treatment services, are eligible for the full GA basic needs standards. See
        - link "0013.15.54 (GA Basis – Drug/Alcohol Addiction)." [ref=e136] [cursor=pointer]:
          - /url: https://www.dhs.state.mn.us/main/idcplg?IdcService=GET_DYNAMIC_CONVERSION&RevisionSelectionMethod=LatestReleased&dDocName=cm_00131554
