      - paragraph [ref=e190]: Offer EGA information and the application on the same day a person inquires about the program. If an emergency is imminent or already present, offer the interview on the same day the unit submits the application. If there is emergent and ongoing need, process the application as soon as possible for ongoing GA eligibility. If there will be a significant delay, EGA may be used for up to 30 days until GA eligibility is determined.
      - paragraph
      - paragraph [ref=e191]: Determine EGA eligibility back to the date of the emergency if the agency receives the application pages within 30 days of the emergency. The unit must be EGA eligible for the county to claim state aid.
