        - text: Use the Family Wage Level (FWL) standard for all applicants at the initial income test.
        - text: When calculating the monthly benefit level, use the FWL only for units with earned income. See
        - link "0022.12 (How to Calc. Benefit Level - MFIP/ GA)." [ref=e280] [cursor=pointer]:
          - /url: https://www.dhs.state.mn.us/main/idcplg?IdcService=GET_DYNAMIC_CONVERSION&RevisionSelectionMethod=LatestReleased&dDocName=cm_002212
        - text: Some state and federal programs do not count the food portion as income. Examples of these programs include housing subsidy programs, low income energy assistance program, and Supplemental Security Income when determining interim assistance amount.
