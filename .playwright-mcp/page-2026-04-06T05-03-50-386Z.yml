        - paragraph [ref=e191]: "ISSUE DATE: 03/2026"
      - paragraph [ref=e192]:
        - text: "MFIP:"
        - text: All families have a basis of eligibility for MFIP and may apply. MFIP defines a family as a minor child or a group of minor children related to each other as siblings, half-siblings, step-siblings, or adopted siblings, along with their birth, step- or adoptive parent(s) or other caregiver(s). For information as to who is eligible for state-funded MFIP, see
        - link "0013.03.06 (MFIP Basis - State-Funded Cash Portion)" [ref=e193] [cursor=pointer]:
          - /url: https://www.dhs.state.mn.us/main/idcplg?IdcService=GET_DYNAMIC_CONVERSION&RevisionSelectionMethod=LatestReleased&dDocName=cm_00130306
        - text: . See CAREGIVER in
        - 'link "0002.09 (Glossary: Calendar Month...)" [ref=e194] [cursor=pointer]':
          - /url: https://www.dhs.state.mn.us/main/idcplg?IdcService=GET_DYNAMIC_CONVERSION&RevisionSelectionMethod=LatestReleased&dDocName=cm_000209
        - text: and MINOR CHILD in
        - 'link "0002.41 (Glossary: Medically Necessary...)" [ref=e195] [cursor=pointer]':
          - /url: https://www.dhs.state.mn.us/main/idcplg?IdcService=GET_DYNAMIC_CONVERSION&RevisionSelectionMethod=LatestReleased&dDocName=cm_000241
        - text: . For specific information on who is in the assistance unit, see
        - link "0014 (Assistance Units)." [ref=e196] [cursor=pointer]:
          - /url: https://www.dhs.state.mn.us/main/idcplg?IdcService=GET_DYNAMIC_CONVERSION&RevisionSelectionMethod=LatestReleased&dDocName=cm_0014
        - text: "Families also include:"
