      - paragraph [ref=e270]:
        - text: "NOTE: Units with an eligible elderly or disabled unit member with income above 200% FPG are non-categorically eligible and must meet the 100% net income test. See"
        - link "0020.12 (SNAP Assistance Standards)" [ref=e271] [cursor=pointer]:
          - /url: https://www.dhs.state.mn.us/main/idcplg?IdcService=GET_DYNAMIC_CONVERSION&RevisionSelectionMethod=LatestReleased&dDocName=cm_002012
        - text: .
        - text: "MSA:"
        - text: The gross income limit is 300% of the SSI Federal Benefit Rate (FBR) for an individual. See
        - link "0029.06.03 (Supplemental Security Income Program)" [ref=e272] [cursor=pointer]:
          - /url: https://www.dhs.state.mn.us/main/idcplg?IdcService=GET_DYNAMIC_CONVERSION&RevisionSelectionMethod=LatestReleased&dDocName=cm_00290603
        - text: for the current rate.
        - text: If a married couple lives together and both partners apply and have a basis of eligibility, use their combined gross income. Their combined gross income must not exceed 600% of the SSI FBR for an individual.
