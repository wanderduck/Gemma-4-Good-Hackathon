        - heading "SNAP ASSISTANCE STANDARDS" [level=1] [ref=e130]
        - paragraph [ref=e131]: "ISSUE DATE: 03/2026"
      - paragraph [ref=e132]:
        - text: "MFIP, MSA, GA, HSP:"
        - text: No provisions.
        - text: "SNAP:"
        - text: Determine the proper assistance standard based on the size of the unit. When determining unit size, use the number of people in the unit in the payment month. See
        - link "0014 (Assistance Units)." [ref=e133] [cursor=pointer]:
          - /url: https://www.dhs.state.mn.us/main/idcplg?IdcService=GET_DYNAMIC_CONVERSION&RevisionSelectionMethod=LatestReleased&dDocName=cm_0014
        - text: Use the table below to determine the net income limit for the unit. Also see
        - link "0019.06 (Gross Income Limits)." [ref=e134] [cursor=pointer]:
          - /url: https://www.dhs.state.mn.us/main/idcplg?IdcService=GET_DYNAMIC_CONVERSION&RevisionSelectionMethod=LatestReleased&dDocName=cm_001906
        - text: Non-categorically eligible units with an eligible elderly or disabled unit member, must have enough deductions to be at or below the 100% FPG limits below. This includes units with an eligible elderly or disabled unit member with income above 200% FPG. For the 200% FPG table, see
        - link "0019.06 (Gross Income Limits)." [ref=e135] [cursor=pointer]:
          - /url: https://www.dhs.state.mn.us/main/idcplg?IdcService=GET_DYNAMIC_CONVERSION&RevisionSelectionMethod=LatestReleased&dDocName=cm_001906
